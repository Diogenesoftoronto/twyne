name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Package release bundle
        run: |
          version="${GITHUB_REF_NAME:-manual}"
          mkdir -p release
          tar \
            --exclude="./node_modules" \
            --exclude="./release" \
            --exclude="./.git" \
            -czf "release/twyne-${version}.tar.gz" .

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false

  # Native desktop builds (Electrobun) — one runner per OS, each uploads its
  # app bundle to the same release the `release` job created. This is what the
  # landing page's "Download Twyne for desktop" link points at.
  desktop:
    needs: release
    name: Desktop (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            asset: twyne-desktop-macos
          - os: windows-latest
            label: Windows
            asset: twyne-desktop-windows
          - os: ubuntu-latest
            label: Linux
            asset: twyne-desktop-linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop app
        run: bun run desktop.build

      - name: Archive app bundle
        shell: bash
        run: |
          version="${GITHUB_REF_NAME:-manual}"
          mkdir -p dist-desktop
          # electrobun emits the platform bundle under ./build (and any
          # installers under ./artifacts). Archive whatever is produced.
          tar -czf "dist-desktop/${{ matrix.asset }}-${version}.tar.gz" \
            $( [ -d build ] && echo build ) \
            $( [ -d artifacts ] && echo artifacts )

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-desktop/*.tar.gz
          generate_release_notes: false
          draft: false
          prerelease: false
